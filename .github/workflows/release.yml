name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Require a semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          semver_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "$GITHUB_REF_NAME" =~ $semver_pattern ]]; then
            echo "Expected a SemVer tag such as v1.2.3 or v1.2.3-rc.1; got: $GITHUB_REF_NAME"
            exit 1
          fi

  verify-backend:
    name: Verify Go
    needs: validate-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l cmd internal)"
          if [[ -n "$unformatted" ]]; then
            echo "The following Go files need formatting:"
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          args: --timeout=5m ./cmd/... ./internal/...

      - name: Test
        run: go test -race -shuffle=on -count=1 ./cmd/... ./internal/...

      - name: Build
        run: go build -trimpath ./cmd/seedgraph

  verify-frontend:
    name: Verify frontend
    needs: validate-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish-image:
    name: Publish container image
    needs: [verify-backend, verify-frontend]
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=sha-

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: |
            type=gha,scope=ci-main
            type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
          provenance: mode=max
          sbom: true

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}

  github-release:
    name: Create GitHub release
    needs: publish-image
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      IMAGE_NAME: ${{ needs.publish-image.outputs.image }}
      IMAGE_DIGEST: ${{ needs.publish-image.outputs.digest }}
    steps:
      - name: Create release if needed
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; leaving it unchanged."
          else
            flags=(
              --repo "$GITHUB_REPOSITORY"
              --verify-tag
              --generate-notes
              --title "SeedGraph $GITHUB_REF_NAME"
              --notes "Container image: \`$IMAGE_NAME@$IMAGE_DIGEST\`"
            )
            if [[ "$GITHUB_REF_NAME" == *-* ]]; then
              flags+=(--prerelease --latest=false)
            fi
            gh release create "$GITHUB_REF_NAME" "${flags[@]}"
          fi

          {
            echo "### Published"
            echo
            echo "- Release: \`$GITHUB_REF_NAME\`"
            echo "- Image: \`$IMAGE_NAME@$IMAGE_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"
